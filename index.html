<!DOCTYPE html>
<!-- Definição do idioma -->
<html lang="pt-br">
<head>
    <!-- Configuração dos caracteres da página -->
    <meta charset="UTF-8">
    <!-- Configuração da visualização da página em dispositivos móveis -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Título da aba no navegador -->
    <title>MEUS SITES FAVORITOS</title>

    <style>
        /* Customização do corpo da página */
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #fff;
        }
        
        /* Organização dos itens da página */
        .container {
                display: flex;
                justify-content: center;
                gap: 65px;
                flex-wrap: wrap;
        }
        .item {
                text-align: center;
        }
        
        /* Customização do título principal */
        h1 {
            color: #333;
        }
        /* Customização dos subtítulos */
        h2 {
            color: #555;
        }
        /* Customização dos links */
        a {
            color: #555;
            font-size: 16px;
            font-style: italic;
            text-decoration: none;
        }
        /* Efeito de sublinhado ao passar o mouse sobre os links */
        a:hover {
            text-decoration: underline;
        }
    </style>

</head>

<body>
    <!-- Título principal da página -->

    <div class="container">

            <!-- Link para o YouTube em formato de texto -->
